name: Publish model to GitHub Pages

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out model site
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download the immutable model release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _site
          cp site/index.html _site/index.html
          gh release download model-v1 \
            --repo "${{ github.repository }}" \
            --pattern note_pedal.fp16.onnx \
            --dir _site
          echo > _site/.nojekyll
          echo "8f2533cc2b466e0b5cb41be22747ed3e3a0ab0dc80b3d11f9b4e7fccda043779  _site/note_pedal.fp16.onnx" | sha256sum --check --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
